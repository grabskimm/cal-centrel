# PLACEHOLDER source registry baked into the image. This is committed to git, so
# it must contain NO real/private data — only generic example labels.
#
# Supply your REAL mapping privately, never in git, via either:
#   * the SOURCES_TOML Workers Secret (Cloudflare) — inline TOML, recommended; or
#   * AVAILCAL_SOURCES_TOML pointing at a mounted/uncommitted file.
# Whichever is set overrides this placeholder at runtime.
[ics]
GoogPersonal = "Perso"
OutlookPub   = "Work"

[caldav]
icloud_calendar   = "iCloud"
fastmail_calendar = "Fastmail"

[device]
"Outlook - Work" = "WorkX"
"Calendar"       = "Mac"
